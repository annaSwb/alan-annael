<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chabbat Hatan – Alan & Annaël</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Cormorant+Garamond&family=Pinyon+Script&display=swap" rel="stylesheet">

<style>
:root {
    --teal:#5faeb6;
    --mauve:#b8a4c9;
    --blue:#7faac9;
    --cream:#f5ecd5;
}

/* BASE */
body{
    font-family:'Cormorant Garamond', serif;
    background:#eef2f2;
}

/* CARD */
.invitation-card{
    max-width:560px;
    margin:40px auto;
    background:white;
    border-radius:20px;
    padding:40px;
    text-align:center;
    position:relative;
    overflow:hidden;
}

/* ================= FLEURS ================= */

.flowers-section{
    position:relative;
    height:120px;
    margin:10px 0 20px;
}

/* fleurs SVG */
.flower{
    position:absolute;
    width:70px;
    opacity:0.85;
    animation:float 6s ease-in-out infinite;
}

.flower.small{ width:45px; opacity:0.7; }
.flower.big{ width:90px; }

.flower1{ left:10%; top:20%; animation-delay:0s;}
.flower2{ right:10%; top:10%; animation-delay:1s;}
.flower3{ left:30%; bottom:0; animation-delay:2s;}
.flower4{ right:25%; bottom:5%; animation-delay:3s;}

@keyframes float{
    0%,100%{ transform:translateY(0px);}
    50%{ transform:translateY(-10px);}
}

/* TITRES */
.names{
    font-family:'Pinyon Script';
    font-size:3.5rem;
}

.title{
    font-family:'Cinzel';
    letter-spacing:2px;
}

/* SVG COLORS */
.blue{ fill:url(#gradBlue);}
.mauve{ fill:url(#gradMauve);}
.cream{ fill:url(#gradCream);}

</style>
</head>

<body>

<div class="invitation-card">

    <div class="names">Alan & Annael</div>
    <div class="title">Chabbat Hatan</div>

    <!-- 🌸 SECTION FLEURS -->
    <div class="flowers-section">

        <!-- defs gradients -->
        <svg width="0" height="0">
            <defs>
                <linearGradient id="gradBlue">
                    <stop offset="0%" stop-color="#7faac9"/>
                    <stop offset="100%" stop-color="#5faeb6"/>
                </linearGradient>
                <linearGradient id="gradMauve">
                    <stop offset="0%" stop-color="#cdb4db"/>
                    <stop offset="100%" stop-color="#a88bc1"/>
                </linearGradient>
                <linearGradient id="gradCream">
                    <stop offset="0%" stop-color="#fff5e6"/>
                    <stop offset="100%" stop-color="#f5ecd5"/>
                </linearGradient>
            </defs>
        </svg>

        <!-- fleurs -->
        <svg class="flower flower1 blue" viewBox="0 0 100 100">
            <circle cx="50" cy="30" r="20"/>
            <circle cx="30" cy="60" r="20"/>
            <circle cx="70" cy="60" r="20"/>
        </svg>

        <svg class="flower flower2 mauve big" viewBox="0 0 100 100">
            <circle cx="50" cy="30" r="22"/>
            <circle cx="30" cy="65" r="22"/>
            <circle cx="70" cy="65" r="22"/>
        </svg>

        <svg class="flower flower3 cream small" viewBox="0 0 100 100">
            <circle cx="50" cy="30" r="18"/>
            <circle cx="30" cy="60" r="18"/>
            <circle cx="70" cy="60" r="18"/>
        </svg>

        <svg class="flower flower4 blue small" viewBox="0 0 100 100">
            <circle cx="50" cy="30" r="18"/>
            <circle cx="30" cy="60" r="18"/>
            <circle cx="70" cy="60" r="18"/>
        </svg>

    </div>

    <!-- CONTENU -->
    <p>vous invitent au</p>

    <div class="title">Vendredi 15 mai 2026</div>

    <p>Hôtel Océania CDG</p>

</div>

</body>
</html>
